name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.x
            9.x

      - name: Add msbuild to PATH
        uses: microsoft/setup-msbuild@v2

      - name: Restore
        run: dotnet restore BetterProgressBar.WinUI3/BetterProgressBar.WinUI3.csproj

      - name: Build (all TFMs)
        run: dotnet build BetterProgressBar.WinUI3/BetterProgressBar.WinUI3.csproj --no-restore -c Release

      - name: Pack
        run: dotnet pack BetterProgressBar.WinUI3/BetterProgressBar.WinUI3.csproj --no-build -c Release -o ./artifacts

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: nupkg
          path: ./artifacts/*.nupkg
